<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>背單字卡片</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; }
    body {
      font-family: 'Noto Serif TC', serif;
      background:
        radial-gradient(circle at top, rgba(92, 14, 14, 0.45), transparent 28%),
        radial-gradient(circle at bottom, rgba(17, 24, 39, 0.95), rgba(2, 6, 23, 1) 70%);
      color: #f5f5f5;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 8px, 8px 100%;
      mix-blend-mode: soft-light;
      opacity: 0.15;
    }
    .flicker { animation: flicker 6s infinite; }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      7% { opacity: 0.88; }
      8% { opacity: 0.96; }
      12% { opacity: 0.72; }
      13% { opacity: 1; }
      43% { opacity: 0.9; }
      44% { opacity: 1; }
      77% { opacity: 0.8; }
      78% { opacity: 1; }
    }
    .flashcard { perspective: 1400px; }
    .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-front, .card-back { transition: transform 0.7s ease; transform-style: preserve-3d; }
    .card-back { transform: rotateY(180deg); }
    .is-flipped .card-front { transform: rotateY(180deg); }
    .is-flipped .card-back { transform: rotateY(360deg); }
    .blood-line {
      background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.75), transparent);
      height: 1px;
      box-shadow: 0 0 18px rgba(220, 38, 38, 0.9);
    }
  </style>
</head>
<body>
  <main class="min-h-screen p-6 flex flex-col items-center relative">
    <header class="w-full max-w-4xl flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-7 pt-4">
      <div>
        <p class="text-xs uppercase tracking-[0.35em] text-red-400/80">haunted vocabulary archive</p>
        <h1 class="text-3xl md:text-5xl font-black text-white drop-shadow-[0_0_16px_rgba(239,68,68,0.25)] flicker">背單字卡片</h1>
        <p class="text-sm text-red-100/70 mt-2 max-w-2xl">點擊卡片翻面，像走進一間被封住的舊屋，正面是單字，背面藏著解釋、詞性與字根線索。</p>
      </div>
      <a class="button bg-red-950/70 text-red-100 border border-red-400/40 px-5 py-2.5 rounded-full shadow-[0_0_22px_rgba(127,29,29,0.45)] backdrop-blur hover:bg-red-900 transition" href="manage.html">管理單字</a>
    </header>

    <section class="w-full max-w-4xl bg-slate-950/80 border border-red-400/20 rounded-[2rem] p-6 md:p-8 shadow-[0_0_50px_rgba(15,23,42,0.85)] backdrop-blur relative overflow-hidden">
      <div class="absolute inset-x-0 top-0 h-px blood-line"></div>
      <div class="mx-auto relative w-full max-w-xl">
        <div class="flashcard cursor-pointer mx-auto w-full max-w-md aspect-[4/3] relative" id="flashcard">
          <div class="card-face card-front absolute inset-0 rounded-[1.75rem] border border-red-400/20 bg-[radial-gradient(circle_at_top,rgba(127,29,29,0.35),rgba(2,6,23,0.98)_65%)] flex items-center justify-center text-4xl md:text-5xl font-black text-red-100 shadow-[0_0_40px_rgba(127,29,29,0.35)]" id="cardFront"></div>
          <div class="card-face card-back absolute inset-0 rounded-[1.75rem] border border-red-400/20 bg-[radial-gradient(circle_at_top,rgba(30,41,59,0.92),rgba(2,6,23,0.98)_72%)] transform rotate-y-180 p-6 text-sm text-red-50 shadow-[0_0_40px_rgba(127,29,29,0.28)]" id="cardBack"></div>
        </div>
      </div>
      <div class="mt-6 flex items-center justify-center gap-4 flex-wrap">
        <button class="button bg-red-900/90 text-red-50 px-4 py-2 rounded-full border border-red-500/30 shadow-[0_0_18px_rgba(127,29,29,0.4)]" id="prevBtn">上一張</button>
        <span id="counter" class="text-sm text-red-100/70 tracking-[0.2em]">0 / 0</span>
        <button class="button bg-red-900/90 text-red-50 px-4 py-2 rounded-full border border-red-500/30 shadow-[0_0_18px_rgba(127,29,29,0.4)]" id="nextBtn">下一張</button>
      </div>
    </section>

    <section class="mt-6 text-center text-red-100/55 text-sm tracking-wide">
      <p>若沒有資料，請先到管理頁新增單字。不要讓空白卡片留太久。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
