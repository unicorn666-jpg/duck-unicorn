<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>同志諮詢 - 支援與諮商資源</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-home">
    <header class="app-header">
      <div>
        <h1>同志諮詢與支援</h1>
        <p>提供友善、安全的線上諮詢表單與在地資源快速查詢。</p>
      </div>
      <a class="button button-secondary" href="contact.html">線上諮詢 / 預約</a>
    </header>

    <section class="card-panel">
      <h2>我們能協助</h2>
      <ul>
        <li>情緒與心理支持（焦慮、憂鬱、壓力）</li>
        <li>同志議題（出櫃、家庭衝突、職場歧視）</li>
        <li>性健康與安全</li>
        <li>危機應對（遭遇暴力或緊急需求）</li>
      </ul>
    </section>

    <section class="manage-list">
      <h2>常見問題</h2>
      <div class="word-card">
        <p><strong>是否匿名提交？</strong> 可以 — 表單可不填真實姓名，建議提供聯絡方式以便進一步回覆。</p>
      </div>
      <div class="word-card">
        <p><strong>緊急情況怎麼辦？</strong> 若有立即危險，請先撥打當地緊急電話或就近求助。</p>
      </div>
    </section>

    <footer style="margin-top:28px; color:var(--muted); text-align:center;">
      <small>此網站為示範用途，真實諮詢請以當地合格專業醫療或社福單位為主。</small>
    </footer>
  </main>

  <script></script>
</body>
</html>
