<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>線上諮詢表單</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-manage">
    <header class="app-header">
      <div>
        <h1>線上諮詢 / 支援申請</h1>
        <p>請誠實填寫您的需求，我們會依您提供的聯絡資料回覆（可匿名）。</p>
      </div>
      <a class="button button-secondary" href="index.html">回到首頁</a>
    </header>

    <form class="manage-form" id="counselForm">
      <div class="field-group">
        <label for="nameInput">姓名（可留空以匿名）</label>
        <input id="nameInput" type="text" placeholder="姓名或暱稱" />
      </div>

      <div class="field-group">
        <label for="emailInput">聯絡 Email（若需要回覆）</label>
        <input id="emailInput" type="email" placeholder="example@mail.com" />
      </div>

      <div class="field-group">
        <label for="countryInput">所在國家 / 地區</label>
        <input id="countryInput" type="text" placeholder="例如 Taiwan / Taiwan, Province of China" />
      </div>

      <div class="field-group">
        <label for="ageInput">年齡（選填）</label>
        <input id="ageInput" type="number" min="0" max="120" />
      </div>

      <div class="field-group">
        <label for="concernInput">關注主題</label>
        <select id="concernInput">
          <option value="out">出櫃/家庭議題</option>
          <option value="mental">情緒/心理支持</option>
          <option value="safety">遭遇歧視/暴力</option>
          <option value="sexual">性健康/性行為諮詢</option>
          <option value="other">其他</option>
        </select>
      </div>

      <div class="field-group">
        <label for="messageInput">訊息 / 需求說明</label>
        <textarea id="messageInput" rows="5" placeholder="請描述您想要諮詢的內容" required></textarea>
      </div>

      <div class="form-actions">
        <button class="button" type="button" id="autoPersonalBtn">自動填入個人資料</button>
        <button class="button" type="button" id="autoCountryBtn">查詢國家資訊</button>
        <button class="button button-success" type="submit">送出諮詢表單</button>
      </div>

      <p class="status-message" id="statusMessage"></p>
    </form>

    <section class="manage-list">
      <h2>資源小提示</h2>
      <div id="resourceBox" class="word-card">點選「查詢國家資訊」可載入該國家基本資訊與建議求助方式。</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
