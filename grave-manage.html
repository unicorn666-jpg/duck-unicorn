<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>單字管理 - Grave</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    html, body { height: 100%; }
    body {
      font-family: 'Noto Serif TC', serif;
      background:
        radial-gradient(circle at top, rgba(92, 14, 14, 0.45), transparent 28%),
        radial-gradient(circle at bottom, rgba(17, 24, 39, 0.95), rgba(2, 6, 23, 1) 70%);
      color: #f5f5f5;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 8px, 8px 100%;
      mix-blend-mode: soft-light;
      opacity: 0.15;
    }
    .flicker { animation: flicker 6s infinite; }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      7% { opacity: 0.88; }
      8% { opacity: 0.96; }
      12% { opacity: 0.72; }
      13% { opacity: 1; }
      43% { opacity: 0.9; }
      44% { opacity: 1; }
      77% { opacity: 0.8; }
      78% { opacity: 1; }
    }
    .word-card button { min-width: 72px; }
  </style>
</head>
<body>
  <main class="min-h-screen p-6 flex flex-col items-center relative">
    <header class="w-full max-w-4xl flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-7 pt-4">
      <div>
        <p class="text-xs uppercase tracking-[0.35em] text-red-400/80">restricted inventory</p>
        <h1 class="text-3xl md:text-5xl font-black text-white drop-shadow-[0_0_16px_rgba(239,68,68,0.25)] flicker">單字管理</h1>
        <p class="text-sm text-red-100/70 mt-2 max-w-2xl">新增、編輯、刪除單字資料，並可自動填入翻譯與詞性。</p>
      </div>
      <a class="button bg-red-950/70 text-red-100 border border-red-400/40 px-5 py-2.5 rounded-full shadow-[0_0_22px_rgba(127,29,29,0.45)] backdrop-blur hover:bg-red-900 transition" href="grave.html">回到學習頁</a>
    </header>

    <form class="w-full max-w-4xl bg-slate-950/80 border border-red-400/20 rounded-[2rem] p-6 md:p-8 shadow-[0_0_50px_rgba(15,23,42,0.85)] backdrop-blur relative overflow-hidden" id="wordForm">
      <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-red-500/80 to-transparent"></div>
      <div class="field-group">
        <label for="wordInput" class="text-red-100/90 font-semibold">英文單字</label>
        <input id="wordInput" type="text" placeholder="輸入英文單字" required class="w-full px-4 py-3 rounded-xl bg-black/40 border border-red-500/20 text-red-50 placeholder:text-red-100/25 focus:outline-none focus:ring-2 focus:ring-red-500/40" />
      </div>
      <div class="field-group">
        <label for="translationInput" class="text-red-100/90 font-semibold">中文解釋</label>
        <textarea id="translationInput" rows="3" placeholder="中文解釋" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-red-500/20 text-red-50 placeholder:text-red-100/25 focus:outline-none focus:ring-2 focus:ring-red-500/40"></textarea>
      </div>
      <div class="field-group">
        <label for="posInput" class="text-red-100/90 font-semibold">詞性</label>
        <input id="posInput" type="text" placeholder="詞性，例如 noun / verb" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-red-500/20 text-red-50 placeholder:text-red-100/25 focus:outline-none focus:ring-2 focus:ring-red-500/40" />
      </div>
      <div class="field-group">
        <label for="rootInput" class="text-red-100/90 font-semibold">字根分析</label>
        <textarea id="rootInput" rows="3" placeholder="字根、字首、字尾分析" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-red-500/20 text-red-50 placeholder:text-red-100/25 focus:outline-none focus:ring-2 focus:ring-red-500/40"></textarea>
      </div>
      <div class="field-group">
        <label for="exampleInput" class="text-red-100/90 font-semibold">例句 / 備註</label>
        <textarea id="exampleInput" rows="2" placeholder="例句或補充說明" class="w-full px-4 py-3 rounded-xl bg-black/40 border border-red-500/20 text-red-50 placeholder:text-red-100/25 focus:outline-none focus:ring-2 focus:ring-red-500/40"></textarea>
      </div>
      <div class="form-actions">
        <button class="button bg-zinc-900 text-red-100 px-4 py-2 rounded-full border border-red-400/25 shadow-[0_0_18px_rgba(127,29,29,0.35)]" type="button" id="autoFillBtn">自動填入</button>
        <button class="button bg-red-900 text-red-50 px-4 py-2 rounded-full border border-red-500/30 shadow-[0_0_18px_rgba(127,29,29,0.35)]" type="submit">新增單字</button>
      </div>
      <p class="status-message mt-3 text-sm text-red-100/70" id="statusMessage"></p>
    </form>

    <section class="manage-list w-full max-w-4xl mt-6 bg-slate-950/80 border border-red-400/20 rounded-[2rem] p-6 md:p-8 shadow-[0_0_50px_rgba(15,23,42,0.85)] backdrop-blur">
      <h2 class="text-2xl font-black text-white mb-4">已儲存單字</h2>
      <div id="wordList"></div>
    </section>
  </main>

  <script src="manage.js?v=20260609a"></script>
</body>
</html>
